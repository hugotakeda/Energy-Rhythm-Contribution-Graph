name: Generate Energy Rhythm SVG

on:
  schedule:
    - cron: "0 3 * * *"   # every day at 03:00 UTC
  workflow_dispatch:        # allow manual run from GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate SVG
        run: node scripts/generateSvg.js
        env:
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GRAPH_TOKEN }}

      - name: Commit & push SVG
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update energy rhythm graph [skip ci]"
          file_pattern: dist/energy-rhythm.svg
